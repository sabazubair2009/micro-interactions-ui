<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buttons Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#0B1020]">
    <!-- ======NAV BAR====== -->
    <div class="bg-[#1A2540] flex flex-row px-2 py-2">
      <h1 class="text-white font-bold text-2xl ml-3 mt-3">
        Micro<span class="text-purple-600">UI.</span>
      </h1>
      <!-- =pages= -->
      <div class="pt-3 ml-90 flex gap-9">
        <a
          href="#"
          class="text-gray-500 font-semibold text-lg hover:underline hover:underline-offset-5"
          >HOME</a
        >
        <a
          href="#"
          class="text-gray-500 font-semibold text-lg hover:underline hover:underline-offset-5"
          >FEATURES</a
        >
        <a
          href="#"
          class="text-gray-500 font-semibold text-lg hover:underline hover:underline-offset-5"
          >PRICING</a
        >
        <a
          href="#"
          class="text-gray-500 font-semibold text-lg hover:underline hover:underline-offset-5"
          >ABOUT</a
        >
      </div>
      <button class="bg-blue-600 text-white font-semibold p-2 rounded-md ml-80">
        Get Started
      </button>
    </div>

    <!--===SECOND SECTION=== -->
    <div>
      <h1 class="text-white flex justify-center font-bold text-5xl mt-6">
        BUTTON SYSTEM
      </h1>
      <p class="text-gray-400 flex justify-center mt-5">
        Micro Interactions &nbsp; <span class="text-blue-600"> ● </span>&nbsp;
        Transitions&nbsp; <span class="text-blue-600"> ● </span> &nbsp; Hover
        Effects
      </p>
    </div>
    <!-- ===THREE CARDS -->
    <div class="flex justify-center gap-10 mt-10">
      <!-- first -->
      <div class="bg-[#1A2540] h-60 w-70">
        <h2 class="text-blue-600 text-[20px] flex justify-center">Primary</h2>
        <div class="flex justify-center">
          <button
            class="bg-blue-600 h-15 w-50 text-white mt-5 rounded-lg hover:shadow-xl hover:shadow-blue-400 hover:underline hover:rotate-3 transition duration-1000 ease-in-out"
          >
            Primary Button &rarr;
          </button>
        </div>
      </div>

      <!-- second -->
      <div class="bg-[#1A2540] h-60 w-70">
        <h2 class="text-[#A855F7] text-[20px] flex justify-center">
          Secondary
        </h2>
        <div class="flex justify-center">
          <button
          class="bg-[#A855F7] h-15 w-50 text-white mt-5 rounded-lg border-2 hover:border-purple-950 hover:underline  hover:text-purple-7s00 transition-colors duration-1000 ease-in-out"
          >
          Secondary Button &rarr;
        </button>

        </div>
      </div>

      <!-- third -->
      <div class="bg-[#1A2540] h-60 w-70">
        <h2 class="text-blue-600 text-[20px] flex justify-center">Outline</h2>
        <div class="flex justify-center">

          <button class=" bg-[#6EE7B7]  h-15 w-50 mt-5 rounded-lg text-green-700 hover:text-white hover:bg-[#1A2540] border hover:border-white transition duration-700 ">Outline Button &rarr;</button>
        </div>
      </div>
    </div>
  </body>
</html>
